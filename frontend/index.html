<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Reach - Save a Life</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'red-reach': '#C53030',
            'red-dark': '#9B2C2C',
            'maroon-bg': '#FEE2E2',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #C53030; border-radius: 4px; }
    .main-container { min-height: 100vh; }
  </style>
</head>

<body class="bg-gray-50 font-sans">
  <div id="app" class="main-container flex flex-col items-center p-4 md:p-8">
    <header class="w-full max-w-5xl flex justify-between items-center py-4 px-6 bg-white shadow-lg rounded-xl mb-8">
      <h1 class="text-3xl font-extrabold text-red-reach tracking-tighter">
        Red <span class="text-red-dark">Reach</span>
      </h1>
      <button onclick="changeView('stats')" class="text-sm font-medium text-red-reach hover:text-red-dark transition duration-150 p-2 rounded-lg hover:bg-red-reach/10">
        View Statistics
      </button>
    </header>

    <main id="content" class="w-full max-w-5xl flex-grow"></main>
  </div>

  <script>
    // --- State ---
    let currentPage = 'home';
    const API_BASE_URL = 'http://127.0.0.1:5000/api';


    async function requestAndFillLocation() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          ['d_', 'r_'].forEach(prefix => {
            const lat = document.getElementById(prefix + 'latitude');
            const lon = document.getElementById(prefix + 'longitude');
            if (lat) lat.value = latitude;
            if (lon) lon.value = longitude;
          });
        },
        err => console.warn('Geolocation error:', err.message),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function showMessage(type, msg) {
      const c = document.getElementById('message-container') || (() => {
        const el = document.createElement('div');
        el.id = 'message-container';
        document.body.appendChild(el);
        return el;
      })();
      const bg = type === 'success' ? 'bg-green-500' : 'bg-red-500';
      c.innerHTML = `<div class="fixed top-4 right-4 z-50 p-4 rounded-lg text-white font-semibold shadow-xl ${bg}">${msg}</div>`;
      setTimeout(() => (c.innerHTML = ''), 4000);
    }

    async function fetchWithRetry(url, opt = {}, n = 3) {
      for (let i = 0; i < n; i++) {
        try {
          const r = await fetch(url, opt);
          if (!r.ok) throw new Error(r.status);
          return r;
        } catch (e) {
          if (i === n - 1) throw e;
          await new Promise(r => setTimeout(r, 2 ** i * 1000));
        }
      }
    }

    function changeView(v) {
      currentPage = v;
      renderView();
    }

    document.addEventListener('input', e => {
  if (e.target && e.target.id === 'search_radius') {
    document.getElementById('radius_value').textContent = e.target.value;
  }
});


    function renderView() {
      const c = document.getElementById('content');
      c.innerHTML = '';
      switch (currentPage) {
        case 'home':
          c.innerHTML = renderHomePage();
          break;
        case 'donor_register':
          c.innerHTML = renderDonorPage();
          requestAndFillLocation();
          break;
        case 'recipient_register':
          c.innerHTML = renderRecipientPage();
          requestAndFillLocation();
          break;
        case 'stats':
          c.innerHTML = renderStatsPage();
          fetchStats();
          break;
      }
    }

    // --- Pages ---
    function renderHomePage() {
      return `
      <div class="text-center py-16 bg-white rounded-xl shadow-2xl relative">
        <div class="absolute inset-0 bg-red-reach opacity-10 blur-3xl rounded-xl"></div>
        <div class="relative z-10 p-6">
          <svg class="w-24 h-24 mx-auto text-red-reach animate-pulse" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path>
          </svg>
          <h2 class="text-6xl font-black text-gray-800 mt-4 mb-2">
            Red <span class="text-red-reach">Reach</span>
          </h2>
          <p class="text-xl text-gray-600 mb-10">Connecting blood requests with life-saving donors, instantly.</p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
            <div onclick="changeView('donor_register')" class="p-8 bg-maroon-bg border-4 border-red-reach rounded-2xl cursor-pointer shadow-xl hover:bg-red-reach/20 transition">
              <h3 class="text-3xl font-bold text-red-dark mb-3">I want to Donate</h3>
              <p class="text-gray-700">Register your details and be notified immediately when someone nearby needs your blood group.</p>
              <button class="mt-4 px-6 py-2 bg-red-reach text-white font-semibold rounded-lg shadow-md hover:bg-red-dark">Become a Donor</button>
            </div>
            <div onclick="changeView('recipient_register')" class="p-8 bg-white border-4 border-gray-200 rounded-2xl cursor-pointer shadow-xl hover:border-red-reach/50 transition">
              <h3 class="text-3xl font-bold text-gray-800 mb-3">I Need Blood</h3>
              <p class="text-gray-600">Post an emergency request. We instantly notify compatible donors closest to your hospital.</p>
              <button class="mt-4 px-6 py-2 bg-gray-700 text-white font-semibold rounded-lg shadow-md hover:bg-red-reach">Post Request</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    function renderDonorPage() {
  return `
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-1 p-6 bg-white rounded-xl shadow-2xl">
        <h3 class="text-2xl font-bold text-red-600 mb-4">Donor Registration</h3>
        <form id="donor-form" onsubmit="event.preventDefault(); handleDonorRegistration()">
          
          <input type="text" id="name" placeholder="Full Name" required class="w-full p-3 border rounded-lg mb-3">
          <input type="number" id="age" placeholder="Age" min="18" max="65" required class="w-full p-3 border rounded-lg mb-3">
          <input type="email" id="email" placeholder="Email" required class="w-full p-3 border rounded-lg mb-3">
          <input type="tel" id="phone" placeholder="Phone" required class="w-full p-3 border rounded-lg mb-3">
          
          <select id="bloodGroup" required class="w-full p-3 border rounded-lg mb-3">
            <option value="">Select Blood Group</option>
            <option>O+</option><option>O-</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option>
          </select>
          
          <input type="text" id="city" placeholder="City" required class="w-full p-3 border rounded-lg mb-3">
          
          <input type="hidden" id="d_latitude">
          <input type="hidden" id="d_longitude">
          
          <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow-md w-full">
            Register & View Requests
          </button>
          
          <button type="button" onclick="changeView('home')" class="w-full mt-3 py-2 bg-gray-200 rounded-lg">
            Back
          </button>
        </form>
      </div>
      
      <div class="lg:col-span-2 p-6 bg-red-50 rounded-xl shadow-2xl">
        <h3 class="text-2xl font-bold text-gray-800 mb-4">Matched Emergency Requests</h3>
        <div id="requests-feed" class="space-y-4">
          <p class="text-gray-500 italic">Fill the form to view nearby requests...</p>
        </div>
      </div>
    </div>
  `;
}


    function renderRecipientPage() {
  return `
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-1 p-6 bg-white rounded-xl shadow-2xl">
        <h3 class="text-2xl font-bold text-red-600 mb-4">Emergency Request Submission</h3>
        <form id="recipient-form" onsubmit="event.preventDefault(); handleRecipientRegistration()">
          
          <input type="text" id="recipient_name" placeholder="Full Name" required class="w-full p-3 border rounded-lg mb-3">
          <input type="tel" id="recipient_phone" placeholder="Phone" required class="w-full p-3 border rounded-lg mb-3">
          <input type="email" id="recipient_email" placeholder="Email" required class="w-full p-3 border rounded-lg mb-3">
          
          <select id="recipient_blood" required class="w-full p-3 border rounded-lg mb-3">
            <option value="">Select Blood Group</option>
            <option>O+</option><option>O-</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option>
          </select>
          
          <input type="text" id="recipient_city" placeholder="City" required class="w-full p-3 border rounded-lg mb-3">
          <input type="text" id="hospital_name" placeholder="Hospital Name" required class="w-full p-3 border rounded-lg mb-3">
          
          <label class="block mb-2 text-gray-700">Search Radius (km)</label>
          <input type="range" id="search_radius" min="30" max="2000" value="30" class="w-full mb-3">
          <p class="text-sm text-gray-500">Current radius: <span id="radius_value">30</span> km</p>

          <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow-md w-full">
            Submit Emergency Request
          </button>

          <button type="button" onclick="changeView('home')" class="w-full mt-3 py-2 bg-gray-200 rounded-lg">
            Back to Home
          </button>
        </form>
      </div>

      <div class="lg:col-span-2 p-6 bg-red-50 rounded-xl shadow-2xl">
        <h3 class="text-2xl font-bold text-gray-800 mb-4">Available Donors Nearby</h3>
        <div id="donors-feed" class="space-y-4">
          <p class="text-gray-500 italic">Submit your request to view matching donors...</p>
        </div>
      </div>
    </div>
  `;
}


    function renderStatsPage() {
      return `
      <div class="bg-white p-8 rounded-xl shadow-2xl max-w-3xl mx-auto">
        <h3 class="text-2xl font-bold text-red-reach mb-6 border-b pb-2">Platform Statistics</h3>
        <div id="stats-data" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="p-4 bg-gray-100 rounded-xl border-l-4 border-red-reach">
            <p class="text-4xl font-extrabold text-red-reach" id="stat-total-donors">...</p>
            <p>Total Donors</p>
          </div>
          <div class="p-4 bg-gray-100 rounded-xl border-l-4 border-red-reach">
            <p class="text-4xl font-extrabold text-red-reach" id="stat-active-requests">...</p>
            <p>Active Requests</p>
          </div>
          <div class="p-4 bg-gray-100 rounded-xl border-l-4 border-red-reach">
            <p class="text-4xl font-extrabold text-red-reach" id="stat-resolved">...</p>
            <p>Resolved Cases</p>
          </div>
          <div class="p-4 bg-gray-100 rounded-xl border-l-4 border-red-reach">
            <p class="text-4xl font-extrabold text-red-reach" id="stat-total-recipients">...</p>
            <p>Total Recipients</p>
          </div>
        </div>
        <button onclick="changeView('home')" class="w-full mt-6 py-2 bg-gray-700 text-white rounded-lg hover:bg-red-reach">Back to Home</button>
      </div>`;
    }

    async function fetchStats() {
      try {
        const res = await fetchWithRetry(`${API_BASE_URL}/stats`);
        const s = await res.json();
        document.getElementById('stat-total-donors').textContent = s.total_donors;
        document.getElementById('stat-active-requests').textContent = s.active_requests;
        document.getElementById('stat-resolved').textContent = s.resolved_cases || '0';
        document.getElementById('stat-total-recipients').textContent = s.total_recipients || '0';
      } catch {
        showMessage('error', 'Failed to load stats');
      }
    }
    async function handleRecipientRegistration() {
  const data = {
    full_name: document.getElementById('r_full_name').value,
    phone: document.getElementById('r_phone').value,
    email: document.getElementById('r_email').value,
    blood_group_needed: document.getElementById('r_blood_group_needed').value,
    city: document.getElementById('r_city').value,
    hospital_name: document.getElementById('r_hospital_name').value,
    latitude: document.getElementById('r_latitude').value,
    longitude: document.getElementById('r_longitude').value,
  };

  try {
    const res = await fetch(`${API_BASE_URL}/recipients/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });

    if (!res.ok) throw new Error('Request failed');
    showMessage('success', 'Emergency request submitted successfully!');
    changeView('stats');
  } catch (err) {
    console.error(err);
    showMessage('error', 'Failed to submit emergency request.');
  }
}


    window.onload = renderView;
  </script>

<script src="static/script.js"></script>
</body>
</html>
